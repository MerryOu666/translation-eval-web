<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>评测完成</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; background: #f7f8fa; }
    .card { max-width: 800px; margin: 0 auto; background: white; border-radius: 14px; padding: 28px; box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    a { display: inline-block; margin: 10px 10px 10px 0; padding: 10px 16px; background: #1677ff; color: white; text-decoration: none; border-radius: 8px; }
    .warn { background: #fff7e6; border: 1px solid #ffd591; border-radius: 8px; padding: 10px; margin-top: 16px; }
    pre { white-space: pre-wrap; background: #f5f5f5; padding: 12px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>评测完成</h1>
    <p>模型：<b>{{ model }}</b></p>
    <p>样本数：{{ count }}</p>
    <p>综合得分平均分：<b>{{ avg }}</b></p>
    <a href="/download/{{ txt_name }}">下载翻译TXT</a>
    <a href="/download/{{ xlsx_name }}">下载评估Excel</a>
    <a href="/">返回首页</a>
    {% if errors %}
      <div class="warn">
        <b>部分行翻译失败：</b>
        <pre>{% for e in errors %}{{ e }}
{% endfor %}</pre>
      </div>
    {% endif %}
  </div>
</body>
</html>
